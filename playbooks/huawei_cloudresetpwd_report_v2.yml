---
- name: Reporte CloudResetPwdAgent Multi-OS
  hosts: all
  gather_facts: yes


  vars:
    ansible_user: "{{ target_user }}"
    ansible_password: "{{ target_password }}"
    ansible_ssh_pass: "{{ target_password }}"
    report_dir: "/tmp/reportes_huawei_agent"

  tasks:
    - name: Crear carpeta de reportes en controlador
      delegate_to: localhost
      become: no
      file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'
      run_once: true

    #################################################
    # LINUX
    #################################################

    - name: Verificar carpeta agente Linux
      stat:
        path: /CloudrResetPwdAgent
      register: linux_agent_dir
      when: ansible_os_family != "Windows"

    - name: Verificar servicio Linux
      shell: |
        if systemctl list-unit-files | grep -iq cloudResetPwdAgent; then
          systemctl is-active cloudResetPwdAgent 2>/dev/null || true
        else
          echo "not-found"
        fi
      register: linux_service
      changed_when: false
      failed_when: false
      when: ansible_os_family != "Windows"

    - name: Obtener versión Linux
      shell: |
        if [ -f /CloudrResetPwdAgent/depend/jre/release ]; then
          grep JAVA_VERSION /CloudrResetPwdAgent/depend/jre/release | cut -d'=' -f2 | tr -d '"'
        else
          echo "NO_VERSION"
        fi
      register: linux_version
      changed_when: false
      failed_when: false
      when: ansible_os_family != "Windows"

    #################################################
    # WINDOWS
    #################################################

    - name: Verificar carpeta agente Windows
      win_stat:
        path: C:\CloudResetPwdAgent
      register: win_agent_dir
      when: ansible_os_family == "Windows"

    - name: Verificar servicio Windows
      win_shell: |
        $svc = Get-Service -Name "cloudResetPwdAgent" -ErrorAction SilentlyContinue
        if ($svc) {
          $svc.Status
        } else {
          "not-found"
        }
      register: win_service
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Windows"

    - name: Obtener versión Windows
      win_shell: |
        if (Test-Path "C:\CloudResetPwdAgent\depend\jre\release") {
          $line = Select-String -Path "C:\CloudResetPwdAgent\depend\jre\release" -Pattern "JAVA_VERSION" | Select-Object -First 1
          if ($line) {
            ($line.Line -split "=")[1].Replace('"','').Trim()
          } else {
            "NO_VERSION"
          }
        } else {
          "NO_VERSION"
        }
      register: win_version
      changed_when: false
      failed_when: false
      when: ansible_os_family == "Windows"

    #################################################
    # RESULTADO UNIFICADO
    #################################################

    - name: Definir resultado final
      set_fact:
        instalado: >-
          {{
            (linux_agent_dir.stat.exists if ansible_os_family != "Windows" else win_agent_dir.stat.exists)
          }}
        servicio: >-
          {{
            (linux_service.stdout | trim if ansible_os_family != "Windows" else win_service.stdout | trim)
          }}
        version: >-
          {{
            (linux_version.stdout | trim if ansible_os_family != "Windows" else win_version.stdout | trim)
          }}

    - name: Definir si requiere reinstalación
      set_fact:
        reinstalar: >-
          {{
            (not instalado)
            or
            (servicio not in ['active','running'])
            or
            (version == 'NO_VERSION')
          }}

    - name: Mostrar resultado
      debug:
        msg:
          - "HOST: {{ inventory_hostname }}"
          - "OS: {{ ansible_os_family }}"
          - "INSTALADO: {{ instalado }}"
          - "SERVICIO: {{ servicio }}"
          - "VERSION: {{ version }}"
          - "REINSTALAR: {{ reinstalar }}"

    - name: Guardar reporte
      delegate_to: localhost
      copy:
        dest: "{{ report_dir }}/{{ inventory_hostname }}.txt"
        content: |
          HOST: {{ inventory_hostname }}
          OS: {{ ansible_os_family }}
          INSTALADO: {{ instalado }}
          SERVICIO: {{ servicio }}
          VERSION: {{ version }}
          REINSTALAR: {{ reinstalar }}

    - name: Resumen global
      delegate_to: localhost
      lineinfile:
        path: "{{ report_dir }}/resumen.txt"
        create: yes
        line: "{{ inventory_hostname }} | {{ ansible_os_family }} | {{ reinstalar }}"
