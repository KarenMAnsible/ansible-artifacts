---
- name: Reporte CloudResetPwdAgent Linux
  hosts: linux
  gather_facts: yes
  become: yes

  vars:
    ansible_connection: ssh
    ansible_user: "{{ usuario }}"
    ansible_password: "{{ password }}"
    ansible_port: 22
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"

  tasks:
    - name: Verificar carpeta del agente
      stat:
        path: /CloudrResetPwdAgent
      register: agent_dir

    - name: Verificar servicio
      shell: |
        systemctl is-active cloudResetPwdAgent 2>/dev/null || echo "not-found"
      register: service_status
      changed_when: false
      failed_when: false

    - name: Obtener version desde release
      shell: |
        if [ -f /CloudrResetPwdAgent/depend/jre/release ]; then
          grep JAVA_VERSION /CloudrResetPwdAgent/depend/jre/release | cut -d'=' -f2 | tr -d '"'
        else
          echo "NO_VERSION"
        fi
      register: version_info
      changed_when: false
      failed_when: false

    - name: Mostrar resultado
      debug:
        msg:
          - "HOST: {{ inventory_hostname }}"
          - "IP: {{ ansible_host | default(inventory_hostname) }}"
          - "INSTALADO: {{ 'SI' if agent_dir.stat.exists else 'NO' }}"
          - "SERVICIO: {{ service_status.stdout | trim }}"
          - "VERSION: {{ version_info.stdout | trim }}"

- name: Reporte CloudResetPwdAgent Windows
  hosts: windows
  gather_facts: yes

  vars:
    ansible_connection: winrm
    ansible_user: "{{ usuario }}"
    ansible_password: "{{ password }}"
    ansible_port: 5985
    ansible_winrm_transport: basic
    ansible_winrm_server_cert_validation: ignore

  tasks:
    - name: Verificar carpeta del agente
      win_stat:
        path: C:\CloudResetPwdAgent
      register: agent_dir

    - name: Verificar servicio
      win_shell: |
        $svc = Get-Service -Name "cloudResetPwdAgent" -ErrorAction SilentlyContinue
        if ($svc) {
          $svc.Status
        } else {
          "not-found"
        }
      register: service_status
      changed_when: false
      failed_when: false

    - name: Obtener version desde release
      win_shell: |
        if (Test-Path "C:\CloudResetPwdAgent\depend\jre\release") {
          $line = Select-String -Path "C:\CloudResetPwdAgent\depend\jre\release" -Pattern "JAVA_VERSION" | Select-Object -First 1
          if ($line) {
            ($line.Line -split "=")[1].Replace('"','').Trim()
          } else {
            "NO_VERSION"
          }
        } else {
          "NO_VERSION"
        }
      register: version_info
      changed_when: false
      failed_when: false

    - name: Mostrar resultado
      debug:
        msg:
          - "HOST: {{ inventory_hostname }}"
          - "IP: {{ ansible_host | default(inventory_hostname) }}"
          - "INSTALADO: {{ 'SI' if agent_dir.stat.exists else 'NO' }}"
          - "SERVICIO: {{ service_status.stdout | trim }}"
          - "VERSION: {{ version_info.stdout | trim }}"