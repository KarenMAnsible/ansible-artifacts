---
- name: Huawei CloudResetPwdAgent - Clean Reinstall (Multi-OS) via AAP Survey
  hosts: all
  gather_facts: true

  vars:
    plugin_zip_url_linux: "https://raw.githubusercontent.com/KarenMAnsible/ansible-artifacts/main/huawei/cloudresetpwd/linux/CloudResetPwdAgent_linux.zip"
    plugin_zip_url_windows: "https://raw.githubusercontent.com/KarenMAnsible/ansible-artifacts/main/huawei/cloudresetpwd/windows/CloudResetPwdAgent_Windows.zip"

    linux_workdir: "/tmp/cloudresetpwdagent"
    linux_zip_path: "/tmp/CloudResetPwdAgent_Linux.zip"

    win_workdir: "C:\\Temp\\CloudResetPwdAgent"
    win_zip_path: "C:\\Temp\\CloudResetPwdAgent_Windows.zip"

  pre_tasks:
    - name: Validar Survey
      assert:
        that:
          - target_user is defined
          - target_password is defined

    - name: Aplicar credenciales Linux
      when: ansible_system == "Linux"
      set_fact:
        ansible_become_password: "{{ target_password }}"

    - name: Aplicar credenciales Windows
      when: ansible_os_family == "Windows"
      set_fact:
        ansible_user: "{{ target_user }}"
        ansible_password: "{{ target_password }}"

  tasks:

    #################################################
    # LINUX
    #################################################

    - name: Linux | Clean reinstall
      when: ansible_system == "Linux"
      become: true
      block:

        - name: Stop y remove agente
          shell: |
            if [ -x /CloudrResetPwdAgent/bin/cloudResetPwdAgent.script ]; then
              cd /CloudrResetPwdAgent/bin
              ./cloudResetPwdAgent.script stop || true
              ./cloudResetPwdAgent.script remove || true
            fi
            rm -rf /CloudrResetPwdAgent
          args:
            executable: /bin/bash

        - name: Crear workdir
          file:
            path: "{{ linux_workdir }}"
            state: directory

        - name: Descargar ZIP
          get_url:
            url: "{{ plugin_zip_url_linux }}"
            dest: "{{ linux_zip_path }}"

        - name: Descomprimir
          unarchive:
            src: "{{ linux_zip_path }}"
            dest: "{{ linux_workdir }}"
            remote_src: true

        - name: Ejecutar setup
          shell: |
            cd {{ linux_workdir }}/CloudResetPwdAgent/CloudResetPwdAgent.Linux
            chmod +x setup.sh
            ./setup.sh
          args:
            executable: /bin/bash

        - name: Levantar servicio
          shell: |
            systemctl daemon-reexec || true
            systemctl daemon-reload || true
            systemctl enable cloudResetPwdAgent 2>/dev/null || true
            systemctl start cloudResetPwdAgent 2>/dev/null || true
            systemctl is-active cloudResetPwdAgent || true
          register: service_start
          changed_when: false
          failed_when: false

        - name: Validar estado servicio
          shell: systemctl is-active cloudResetPwdAgent
          register: final_status
          changed_when: false
          failed_when: false

        - name: Obtener logs si falla
          shell: journalctl -u cloudResetPwdAgent -n 50 --no-pager
          register: service_logs
          when: final_status.stdout != "active"
          changed_when: false
          failed_when: false

        - name: Mostrar resultado Linux
          debug:
            msg:
              - "Servicio: {{ final_status.stdout }}"
              - "Logs: {{ service_logs.stdout | default('OK') }}"

    #################################################
    # WINDOWS
    #################################################

    - name: Windows | Clean reinstall
      when: ansible_os_family == "Windows"
      block:

        - name: Crear workdir
          win_file:
            path: "{{ win_workdir }}"
            state: directory

        - name: Descargar ZIP
          win_get_url:
            url: "{{ plugin_zip_url_windows }}"
            dest: "{{ win_zip_path }}"

        - name: Descomprimir
          win_shell: |
            Expand-Archive -Path "{{ win_zip_path }}" -DestinationPath "{{ win_workdir }}" -Force

        - name: Ejecutar setup
          win_shell: |
            cd "{{ win_workdir }}\CloudResetPwdAgent\CloudResetPwdAgent.Windows"
            cmd.exe /c setup.bat

        - name: Asegurar servicio activo
          win_service:
            name: "cloudResetPwdAgent"
            state: started

        - name: Mostrar resultado Windows
          debug:
            msg:
              - "Servicio Windows iniciado"
