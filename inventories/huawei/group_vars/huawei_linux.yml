ansible_connection: ssh
ansible_port: 22
ansible_python_interpreter: /usr/bin/python3

ansible_user: root

ansible_password: "{{ vars['vault_' + (inventory_hostname | replace('-', '_')) + '_password'] }}"
ansible_ssh_pass: "{{ vars['vault_' + (inventory_hostname | replace('-', '_')) + '_password'] }}"

ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
ansible_ssh_extra_args: '-o PreferredAuthentications=password -o PubkeyAuthentication=no'
